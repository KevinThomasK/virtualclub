services:
  # ONLY the Colyseus multiplayer server belongs on Render.
  # Deploy the Next.js app separately on Vercel (do NOT run npm run dev here).
  - type: web
    name: virtualclub
    runtime: node
    plan: free
    # Build the server package only
    buildCommand: npm install && npm run build -w server
    # Production start — never "npm run dev"
    startCommand: npm start -w server
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
